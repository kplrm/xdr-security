## This is an example on how to run OpenSearch and Dashboards including XDR plugins in a Docker environment.
## This is for demonstration and testing purposes only. Do not use this configuration in production environments.
services:
  opensearch-node:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-node
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-SecureP@ssword1}
      - bootstrap.memory_lock=true
      - logger.level=error
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./config/performance-analyzer.properties:/usr/share/opensearch/config/opensearch-performance-analyzer/performance-analyzer.properties:ro
      - ./config/plugin-stats-metadata:/usr/share/opensearch/config/opensearch-performance-analyzer/plugin-stats-metadata:ro
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - opensearch-net
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -k -s -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-SecureP@ssword1} https://localhost:9200/_cluster/health >/dev/null"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  opensearch-init:
    image: opensearchproject/opensearch:latest
    container_name: opensearch-init
    depends_on:
      opensearch-node:
        condition: service_healthy
    environment:
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-SecureP@ssword1}
    networks:
      - opensearch-net
    entrypoint: >
      bash -c '
        set -euo pipefail;

        echo "Preparing demo security certificates and config...";
        /usr/share/opensearch/plugins/opensearch-security/tools/install_demo_configuration.sh -y;

        echo "Waiting for OpenSearch TCP port...";
        until curl -k --silent https://opensearch-node:9200 >/dev/null; do
          echo "HTTP not ready yet...";
          sleep 5;
        done;

        echo "Port is open. Running securityadmin immediately...";
        /usr/share/opensearch/plugins/opensearch-security/tools/securityadmin.sh \
          -cd /usr/share/opensearch/config/opensearch-security \
          -icl \
          -nhnv \
          -h opensearch-node \
          -p 9200 \
          -key /usr/share/opensearch/config/kirk-key.pem \
          -cert /usr/share/opensearch/config/kirk.pem \
          -cacert /usr/share/opensearch/config/root-ca.pem;

        echo "Security initialized. Now waiting for cluster health...";
        until curl -k -u admin:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://opensearch-node:9200/_cluster/health | grep -E "green|yellow"; do
          echo "Cluster still stabilizing...";
          sleep 5;
        done;

        echo "Cluster is ready.";
      '

  xdr-plugins-sidecar:
    image: ghcr.io/kplrm/xdr-plugins:latest
    container_name: xdr-plugins
    restart: unless-stopped
    volumes:
      - xdr-plugins:/plugins
    networks:
      - opensearch-net
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    restart: unless-stopped
    ports:
      - 5601:5601
    environment:
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME:-admin}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-SecureP@ssword1}
    volumes:
      - xdr-plugins:/xdr-plugins:ro
      - ./config/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml:ro
    networks:
      - opensearch-net
    depends_on:
      opensearch-node:
        condition: service_healthy
      opensearch-init:
        condition: service_completed_successfully
      xdr-plugins-sidecar:
        condition: service_started
    command: >
      sh -c 'for p in /xdr-plugins/*.zip; do [ -e "$$p" ] || break; /usr/share/opensearch-dashboards/bin/opensearch-dashboards-plugin install --allow-root "file://$$p"; done; exec /usr/share/opensearch-dashboards/bin/opensearch-dashboards'
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  opensearch-data:
  xdr-plugins:

networks:
  opensearch-net:
    driver: bridge
