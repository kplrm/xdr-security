name: XDR Plugin Bundle Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENSEARCH_DASHBOARDS_REPOSITORY: opensearch-project/OpenSearch-Dashboards
  OPENSEARCH_DASHBOARDS_VERSION: 3.5.0
  OPENSEARCH_DASHBOARDS_REF: 3.5.0
  XDR_COORDINATOR_REPOSITORY: ${{ github.repository_owner }}/xdr-coordinator
  XDR_DEFENSE_REPOSITORY: ${{ github.repository_owner }}/xdr-defense
  XDR_VISUALIZER_REPOSITORY: ${{ github.repository_owner }}/xdr-visualizer

jobs:
  metadata:
    name: Compute release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      bundle: ${{ steps.meta.outputs.bundle }}
      checksums: ${{ steps.meta.outputs.checksums }}
      manifest: ${{ steps.meta.outputs.manifest }}
      compose: ${{ steps.meta.outputs.compose }}
    steps:
      - name: Compute release metadata
        id: meta
        run: |
          set -euo pipefail
          TAG="xdr-$(date -u +%y%m%d)-${GITHUB_SHA::7}"
          BUNDLE="xdr-plugins_${TAG}_osd-${{ env.OPENSEARCH_DASHBOARDS_VERSION }}.tar.gz"
          CHECKSUMS="xdr-plugins_${TAG}_osd-${{ env.OPENSEARCH_DASHBOARDS_VERSION }}.sha256"
          MANIFEST="xdr-plugins_${TAG}_manifest.json"
          COMPOSE="docker-compose.xdr-plugins.${TAG}.yml"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "bundle=${BUNDLE}" >> "$GITHUB_OUTPUT"
          echo "checksums=${CHECKSUMS}" >> "$GITHUB_OUTPUT"
          echo "manifest=${MANIFEST}" >> "$GITHUB_OUTPUT"
          echo "compose=${COMPOSE}" >> "$GITHUB_OUTPUT"

  build-plugin:
    name: Build ${{ matrix.plugin }} ZIP
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - plugin: xdr-security
            repository: ''
          - plugin: xdr-coordinator
            repository: ${{ github.repository_owner }}/xdr-coordinator
          - plugin: xdr-defense
            repository: ${{ github.repository_owner }}/xdr-defense
          - plugin: xdr-visualizer
            repository: ${{ github.repository_owner }}/xdr-visualizer

    permissions:
      contents: read

    steps:
      - name: Checkout xdr-security
        uses: actions/checkout@v4
        with:
          path: sources/xdr-security

      - name: Checkout external plugin repo
        if: matrix.repository != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          path: sources/${{ matrix.plugin }}

      - name: Checkout OpenSearch Dashboards
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENSEARCH_DASHBOARDS_REPOSITORY }}
          ref: ${{ env.OPENSEARCH_DASHBOARDS_REF }}
          path: opensearch-dashboards

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: opensearch-dashboards/.nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install Yarn
        run: npm install -g yarn@1.22.22

      - name: Cache yarn packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/yarn
          key: ${{ runner.os }}-yarn-osd-${{ hashFiles('opensearch-dashboards/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-osd-

      - name: Bootstrap OpenSearch Dashboards
        working-directory: opensearch-dashboards
        run: yarn osd bootstrap --single-version=loose || yarn osd bootstrap --single-version=loose

      - name: Resolve plugin source path
        id: src
        run: |
          if [ "${{ matrix.plugin }}" = "xdr-security" ]; then
            echo "path=${GITHUB_WORKSPACE}/sources/xdr-security" >> "$GITHUB_OUTPUT"
          else
            echo "path=${GITHUB_WORKSPACE}/sources/${{ matrix.plugin }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage plugin source
        run: |
          set -euo pipefail
          mkdir -p "opensearch-dashboards/plugins/${{ matrix.plugin }}"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='build' \
            --exclude='node_modules' \
            --exclude='opensearch-dashboards' \
            --exclude='sources' \
            "${{ steps.src.outputs.path }}/" "opensearch-dashboards/plugins/${{ matrix.plugin }}/"

      - name: Verify plugin version metadata
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('${{ steps.src.outputs.path }}/package.json').version")
          MANIFEST_VERSION=$(node -p "require('${{ steps.src.outputs.path }}/opensearch_dashboards.json').version")

          if [ "${PACKAGE_VERSION}" != "${MANIFEST_VERSION}" ]; then
            echo "Version mismatch in ${{ matrix.plugin }}: package.json=${PACKAGE_VERSION}, opensearch_dashboards.json=${MANIFEST_VERSION}" >&2
            exit 1
          fi

      - name: Build plugin ZIP
        working-directory: opensearch-dashboards/plugins/${{ matrix.plugin }}
        run: node ../../scripts/plugin_helpers build --opensearch-dashboards-version=${{ env.OPENSEARCH_DASHBOARDS_VERSION }}

      - name: Collect plugin artifact
        run: |
          set -euo pipefail
          mkdir -p out/plugins out/meta

          ZIP_PATH=$(find "opensearch-dashboards/plugins/${{ matrix.plugin }}/build" -maxdepth 1 -name '*.zip' | head -1)
          if [ -z "${ZIP_PATH}" ]; then
            echo "Built ZIP not found for ${{ matrix.plugin }}" >&2
            exit 1
          fi

          cp "${ZIP_PATH}" "out/plugins/${{ matrix.plugin }}.zip"

          PACKAGE_VERSION=$(node -p "require('${{ steps.src.outputs.path }}/package.json').version")
          PLUGIN_ID=$(node -p "require('${{ steps.src.outputs.path }}/opensearch_dashboards.json').id")

          cat > "out/meta/${{ matrix.plugin }}.json" <<EOF
          {
            "repo": "${{ matrix.plugin }}",
            "pluginId": "${PLUGIN_ID}",
            "version": "${PACKAGE_VERSION}",
            "osdVersion": "${{ env.OPENSEARCH_DASHBOARDS_VERSION }}"
          }
          EOF

      - name: Upload plugin artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}
          path: out/
          retention-days: 2

  bundle-assets:
    name: Bundle release artifacts
    needs: [metadata, build-plugin]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download all plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: release-artifacts/raw
          merge-multiple: true

      - name: Assemble release-artifacts directories
        run: |
          set -euo pipefail
          mkdir -p release-artifacts/plugins release-artifacts/meta
          cp release-artifacts/raw/plugins/*.zip release-artifacts/plugins/
          cp release-artifacts/raw/meta/*.json release-artifacts/meta/

      - name: Build manifest JSON
        run: |
          set -euo pipefail
          jq -s \
            --arg osd "${{ env.OPENSEARCH_DASHBOARDS_VERSION }}" \
            --arg tag "${{ needs.metadata.outputs.tag }}" \
            '{releaseTag: $tag, opensearchDashboardsVersion: $osd, plugins: .}' \
            release-artifacts/meta/*.json > "release-artifacts/${{ needs.metadata.outputs.manifest }}"

      - name: Generate checksums
        run: |
          set -euo pipefail
          (
            cd release-artifacts/plugins
            sha256sum *.zip > "../${{ needs.metadata.outputs.checksums }}"
          )

      - name: Create plugin bundle tarball
        run: |
          set -euo pipefail
          tar -czf "release-artifacts/${{ needs.metadata.outputs.bundle }}" -C release-artifacts/plugins .

      - name: Generate compose override asset
        run: |
          set -euo pipefail
          cat > "release-artifacts/${{ needs.metadata.outputs.compose }}" <<EOF
          services:
            opensearch-dashboards:
              image: ghcr.io/${{ github.repository_owner }}/opensearch-dashboards-xdr-bundle:${{ needs.metadata.outputs.tag }}
              ports:
                - "5601:5601"
              environment:
                OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
          EOF

      - name: Upload release assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-assets
          path: release-artifacts/
          retention-days: 2

  smoke-test:
    name: "[${{ matrix.os }}/${{ matrix.arch }}] smoke test bundle image"
    needs: [metadata, build-plugin]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: debian
            arch: amd64
            test_image: debian:stable-slim
            platform: linux/amd64
          - os: debian
            arch: arm64
            test_image: debian:stable-slim
            platform: linux/arm64
          - os: centos
            arch: amd64
            test_image: almalinux:9
            platform: linux/amd64
          - os: centos
            arch: arm64
            test_image: almalinux:9
            platform: linux/arm64

    steps:
      - name: Set up QEMU (arm64 only)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Download all plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: plugins-input
          merge-multiple: true

      - name: Create test Dockerfile
        run: |
          set -euo pipefail
          mkdir -p docker-build
          cp plugins-input/plugins/*.zip docker-build/

          cat > docker-build/test-Dockerfile <<'EOF'
          ARG BASE_IMAGE
          FROM ${BASE_IMAGE}

          # Install opensearch-dashboards
          RUN set -eux; \
              if command -v apt-get >/dev/null 2>&1; then \
                apt-get update -qq && \
                apt-get install -y bash ca-certificates curl gzip tar >/dev/null; \
              else \
                dnf install -y --allowerasing bash ca-certificates curl gzip tar which findutils >/dev/null; \
              fi

          # Download and extract OSD
          RUN set -eux; \
              OSD_URL="https://artifacts.opensearch.org/releases/bundle/opensearch-dashboards/${{ env.OPENSEARCH_DASHBOARDS_VERSION }}/opensearch-dashboards-${{ env.OPENSEARCH_DASHBOARDS_VERSION }}-linux-$(uname -m | sed 's/x86_64/x64/g' | sed 's/aarch64/arm64/g').tar.gz"; \
              mkdir -p /opt/osd && \
              curl -fsSL "${OSD_URL}" | tar -xz -C /opt/osd

          # Install plugins
          COPY *.zip /tmp/plugins/
          RUN set -eux; \
              OSD_HOME=$(find /opt/osd -maxdepth 1 -type d -name 'opensearch-dashboards-*' | head -1); \
              for plugin in /tmp/plugins/*.zip; do \
                "${OSD_HOME}/bin/opensearch-dashboards-plugin" install --allow-root "file://${plugin}"; \
              done && \
              ls "${OSD_HOME}/plugins/" && \
              echo 'Plugin installation test passed'
          EOF

      - name: Run multi-platform smoke test
        uses: docker/build-push-action@v6
        with:
          context: docker-build
          file: docker-build/test-Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BASE_IMAGE=${{ matrix.test_image }}
          push: false
          outputs: type=oci

  docker-image:
    name: Build and publish bundle image
    needs: [metadata, build-plugin, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download all plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: docker-input
          merge-multiple: true

      - name: Create Docker build context
        run: |
          set -euo pipefail
          mkdir -p docker-context/plugins
          cp docker-input/plugins/*.zip docker-context/plugins/

          cat > docker-context/Dockerfile <<'EOF'
          ARG OSD_VERSION=3.5.0
          FROM opensearchproject/opensearch-dashboards:${OSD_VERSION}

          COPY plugins/*.zip /tmp/xdr-plugins/
          RUN set -eux; \
              for plugin in /tmp/xdr-plugins/*.zip; do \
                /usr/share/opensearch-dashboards/bin/opensearch-dashboards-plugin install --allow-root "file://${plugin}"; \
              done
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform bundle image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OSD_VERSION=${{ env.OPENSEARCH_DASHBOARDS_VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/opensearch-dashboards-xdr-bundle:${{ needs.metadata.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/opensearch-dashboards-xdr-bundle:latest

  docker-plugin-sidecar:
    name: Build and publish plugin-only sidecar image
    needs: [metadata, build-plugin, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download all plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: sidecar-input
          merge-multiple: true

      - name: Create plugin sidecar build context
        run: |
          set -euo pipefail
          mkdir -p sidecar-context/plugins
          cp sidecar-input/plugins/*.zip sidecar-context/plugins/

          cat > sidecar-context/Dockerfile <<'EOF'
          FROM alpine:latest

          # This image is a plugin source that can be mounted into OpenSearch Dashboards
          # Mount /plugins to your OSD container's plugin directory
          # Example: docker run -v xdr-plugins:/plugins opensearch-dashboards

          COPY plugins/ /plugins/
          RUN ls -lh /plugins/

          ENTRYPOINT ["sh", "-c", "echo 'XDR plugin container mounted at /plugins' && tail -f /dev/null"]
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform plugin-only image
        uses: docker/build-push-action@v6
        with:
          context: sidecar-context
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/xdr-plugins:${{ needs.metadata.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/xdr-plugins:latest

  publish-release:
    name: Publish GitHub release
    needs: [metadata, bundle-assets, docker-image, docker-plugin-sidecar]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle-assets
          path: release-artifacts

      - name: Create and push release tag
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

          if git rev-parse "${{ needs.metadata.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ needs.metadata.outputs.tag }}"
          else
            git tag "${{ needs.metadata.outputs.tag }}"
            git push origin "${{ needs.metadata.outputs.tag }}"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: XDR plugin bundle ${{ needs.metadata.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-artifacts/${{ needs.metadata.outputs.bundle }}
            release-artifacts/${{ needs.metadata.outputs.checksums }}
            release-artifacts/${{ needs.metadata.outputs.manifest }}
            release-artifacts/${{ needs.metadata.outputs.compose }}
